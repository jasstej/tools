<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GhostVault</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- ══ LOCK SCREEN ════════════════════════════════════════════════════════ -->
  <div id="screen-lock" class="screen active">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
        <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="12" cy="16" r="1.5" fill="currentColor"/>
      </svg>
      <span class="brand-name">GhostVault</span>
    </div>
    <p class="brand-sub">// encrypted password manager</p>

    <div class="form-group">
      <label for="master-password">Master Password</label>
      <div class="input-wrap">
        <input type="password" id="master-password" placeholder="Enter master password" autocomplete="off" autofocus>
        <button class="toggle-vis" data-target="master-password" title="Show/hide">
          <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <div id="lock-actions" class="btn-row">
      <button id="btn-unlock" class="btn btn-primary">Unlock Vault</button>
      <button id="btn-new-vault" class="btn btn-ghost">New Vault</button>
    </div>
    <div id="lock-error" class="error-msg hidden"></div>

    <div class="hint">
      Load vault file from external device →
      <label class="link-btn" for="file-import-lock">Browse</label>
      <input type="file" id="file-import-lock" accept=".ghostvault,.json" style="display:none">
    </div>
  </div>

  <!-- ══ MAIN VAULT ══════════════════════════════════════════════════════════ -->
  <div id="screen-vault" class="screen">

    <!-- top bar -->
    <div class="topbar">
      <div class="topbar-left">
        <svg class="topbar-icon" viewBox="0 0 24 24" fill="none">
          <rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="12" cy="16" r="1.5" fill="currentColor"/>
        </svg>
        <span class="topbar-title">GhostVault</span>
        <span id="vault-filename" class="vault-badge"></span>
      </div>
      <div class="topbar-right">
        <button id="btn-save" class="icon-btn" title="Save vault to external device">
          <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        </button>
        <button id="btn-lock" class="icon-btn" title="Lock vault">
          <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
        </button>
      </div>
    </div>

    <!-- tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="passwords">Passwords</button>
      <button class="tab" data-tab="add">+ Add</button>
      <button class="tab" data-tab="generator">Generator</button>
    </div>

    <!-- ── PASSWORDS TAB ────────────────────────────────────────────────── -->
    <div id="tab-passwords" class="tab-content active">
      <div class="search-row">
        <input type="text" id="search-input" placeholder="Search site or username…">
      </div>
      <div id="entries-list" class="entries-list">
        <div class="empty-state">No entries yet. Add one!</div>
      </div>
    </div>

    <!-- ── ADD / EDIT TAB ──────────────────────────────────────────────── -->
    <div id="tab-add" class="tab-content">
      <h3 id="add-tab-title" class="section-title">New Entry</h3>

      <div class="form-group">
        <label for="entry-site">Site / App</label>
        <input type="text" id="entry-site" placeholder="e.g. github.com">
      </div>
      <div class="form-group">
        <label for="entry-username">Username / Email</label>
        <input type="text" id="entry-username" placeholder="user@example.com" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="entry-password">Password</label>
        <div class="input-wrap">
          <input type="password" id="entry-password" placeholder="Password" autocomplete="new-password">
          <button class="toggle-vis" data-target="entry-password" title="Show/hide">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <button id="btn-use-generated" class="link-btn small">Use generated password</button>
      </div>
      <div class="form-group">
        <label for="entry-notes">Notes</label>
        <textarea id="entry-notes" rows="3" placeholder="Optional notes…"></textarea>
      </div>

      <div class="btn-row">
        <button id="btn-save-entry" class="btn btn-primary">Save Entry</button>
        <button id="btn-cancel-edit" class="btn btn-ghost hidden">Cancel</button>
      </div>
      <div id="add-error" class="error-msg hidden"></div>
      <div id="add-success" class="success-msg hidden"></div>
    </div>

    <!-- ── GENERATOR TAB ───────────────────────────────────────────────── -->
    <div id="tab-generator" class="tab-content">
      <h3 class="section-title">Password Generator</h3>

      <div class="form-group">
        <label>Length: <span id="gen-length-val">20</span></label>
        <input type="range" id="gen-length" min="8" max="64" value="20">
      </div>

      <div class="checkbox-grid">
        <label class="checkbox-label"><input type="checkbox" id="gen-upper" checked> Uppercase (A-Z)</label>
        <label class="checkbox-label"><input type="checkbox" id="gen-lower" checked> Lowercase (a-z)</label>
        <label class="checkbox-label"><input type="checkbox" id="gen-digits" checked> Digits (0-9)</label>
        <label class="checkbox-label"><input type="checkbox" id="gen-symbols" checked> Symbols (!@#…)</label>
      </div>

      <div class="generated-box">
        <span id="generated-password" class="mono">—</span>
        <button id="btn-copy-gen" class="icon-btn small" title="Copy">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>

      <div class="btn-row">
        <button id="btn-generate" class="btn btn-primary">Generate</button>
        <button id="btn-use-gen-in-add" class="btn btn-ghost">Use in Add Entry</button>
      </div>
    </div>
  </div>

  <!-- ══ ENTRY DETAIL MODAL ═════════════════════════════════════════════════ -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <span id="modal-site" class="modal-site"></span>
        <button id="modal-close" class="icon-btn">✕</button>
      </div>
      <div class="modal-body">
        <div class="detail-row">
          <span class="detail-label">Username</span>
          <span id="modal-username" class="detail-value mono"></span>
          <button class="copy-btn" data-copy="username" title="Copy">⧉</button>
        </div>
        <div class="detail-row">
          <span class="detail-label">Password</span>
          <span id="modal-password" class="detail-value mono masked">••••••••</span>
          <button class="reveal-btn" title="Reveal">👁</button>
          <button class="copy-btn" data-copy="password" title="Copy">⧉</button>
        </div>
        <div class="detail-row" id="modal-notes-row">
          <span class="detail-label">Notes</span>
          <span id="modal-notes" class="detail-value"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Updated</span>
          <span id="modal-updated" class="detail-value small"></span>
        </div>
      </div>
      <div class="modal-footer">
        <button id="modal-edit" class="btn btn-ghost small">Edit</button>
        <button id="modal-delete" class="btn btn-danger small">Delete</button>
      </div>
    </div>
  </div>

  <!-- ══ TOAST ══════════════════════════════════════════════════════════════ -->
  <div id="toast" class="toast hidden"></div>

  <!-- hidden save anchor -->
  <a id="save-anchor" style="display:none"></a>

  <script src="popup.js"></script>
</body>
</html>
