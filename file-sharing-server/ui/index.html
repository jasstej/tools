<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Sharing Server</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg0: #0d1117;
            --bg1: #161b22;
            --text: #e6edf3;
            --text-secondary: #8b949e;
            --border: #30363d;
            --blue: #58a6ff;
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d29922;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--bg0);
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 250px;
            background-color: var(--bg1);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 20px;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background-color: var(--bg1);
            border-bottom: 1px solid var(--border);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .breadcrumb {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
            font-size: 14px;
        }

        .breadcrumb-item {
            cursor: pointer;
            color: var(--blue);
            text-decoration: none;
        }

        .breadcrumb-item:hover {
            text-decoration: underline;
        }

        .breadcrumb-separator {
            color: var(--text-secondary);
        }

        .file-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .file-item {
            background-color: var(--bg1);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .file-item:hover {
            border-color: var(--blue);
            background-color: rgba(88, 166, 255, 0.1);
        }

        .file-item-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-item-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .file-item-size {
            padding: 2px 8px;
            background-color: var(--bg0);
            border-radius: 3px;
        }

        .file-item.is-dir {
            background-color: rgba(58, 166, 80, 0.1);
            border-color: var(--green);
        }

        .file-item-actions {
            display: flex;
            gap: 8px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        button {
            background-color: var(--blue);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background-color 0.2s;
            flex: 1;
        }

        button:hover {
            background-color: #79c0ff;
        }

        button.secondary {
            background-color: var(--border);
        }

        button.secondary:hover {
            background-color: #484f58;
        }

        button.danger {
            background-color: var(--red);
        }

        button.danger:hover {
            background-color: #f97583;
        }

        .upload-zone {
            background-color: var(--bg1);
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .upload-zone:hover,
        .upload-zone.dragover {
            border-color: var(--blue);
            background-color: rgba(88, 166, 255, 0.05);
        }

        .upload-zone-text {
            color: var(--text-secondary);
        }

        .hidden-file-input {
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background-color: var(--border);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--green);
            width: 0%;
            transition: width 0.3s;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg1);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid var(--border);
            max-width: 500px;
            width: 90%;
            min-width: 300px;
        }

        .modal-header {
            font-size: 20px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            background-color: var(--bg0);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 4px rgba(88, 166, 255, 0.3);
        }

        .sidebar-section {
            margin-bottom: 30px;
        }

        .sidebar-section-title {
            font-weight: 600;
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .sidebar-list {
            list-style: none;
        }

        .sidebar-item {
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 13px;
        }

        .sidebar-item:hover {
            background-color: var(--border);
        }

        .sidebar-item.active {
            background-color: rgba(88, 166, 255, 0.2);
            color: var(--blue);
        }

        .message {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            border-left: 4px solid;
        }

        .message.success {
            background-color: rgba(63, 185, 80, 0.1);
            border-left-color: var(--green);
            color: var(--green);
        }

        .message.error {
            background-color: rgba(248, 81, 73, 0.1);
            border-left-color: var(--red);
            color: var(--red);
        }

        .message.info {
            background-color: rgba(88, 166, 255, 0.1);
            border-left-color: var(--blue);
            color: var(--blue);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .header-token {
            background-color: var(--bg0);
            padding: 10px 15px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            cursor: pointer;
        }

        .header-token:hover {
            background-color: var(--border);
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
                display: none;
            }

            .file-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-section-title">Shares</div>
                <ul class="sidebar-list" id="sharesList">
                    <li class="sidebar-item">Loading...</li>
                </ul>
            </div>

            <div class="sidebar-section">
                <button onclick="app.showNewFolderModal()" style="width: 100%;">
                    + New Folder
                </button>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-section-title">About</div>
                <div style="font-size: 12px; color: var(--text-secondary);">
                    File Sharing Server v1.0<br>
                    <br>
                    Made with ❤️ for secure file sharing on trusted networks.
                </div>
            </div>
        </div>

        <div class="main">
            <div class="header">
                <h1>📁 File Sharing</h1>
                <div class="header-actions">
                    <div class="header-token" title="Click to copy" id="tokenDisplay">
                        Loading...
                    </div>
                </div>
            </div>

            <div class="content">
                <div id="messageContainer"></div>

                <div class="breadcrumb" id="breadcrumb">
                    <span class="breadcrumb-item" onclick="app.navigate('')">Root</span>
                </div>

                <div class="upload-zone" id="uploadZone">
                    <div style="font-size: 48px; margin-bottom: 10px;">📤</div>
                    <div class="upload-zone-text">
                        <strong>Drag files here to upload</strong><br>
                        or click to select
                    </div>
                    <input type="file" id="fileInput" class="hidden-file-input" multiple>
                </div>

                <div class="file-list" id="fileList">
                    <div class="empty-state">
                        <div class="empty-state-icon">📁</div>
                        <p>No files yet</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- New Folder Modal -->
    <div class="modal" id="newFolderModal">
        <div class="modal-content">
            <div class="modal-header">Create New Folder</div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="folderNameInput">Folder Name:</label>
                    <input type="text" id="folderNameInput" placeholder="my-folder">
                </div>
            </div>
            <div class="modal-footer">
                <button class="secondary" onclick="app.closeModal()">Cancel</button>
                <button onclick="app.createFolder()">Create</button>
            </div>
        </div>
    </div>

    <script>
        class FileShareApp {
            constructor() {
                this.currentPath = '';
                this.currentShare = null;
                this.shares = [];
                this.token = this.getTokenFromUrl();
                this.init();
            }

            getTokenFromUrl() {
                const params = new URLSearchParams(window.location.search);
                return params.get('token');
            }

            async init() {
                if (!this.token) {
                    this.showError('No access token provided. Use: http://host:port/?token=YOUR_TOKEN');
                    return;
                }

                this.updateTokenDisplay();
                this.setupEventListeners();
                await this.loadShares();
            }

            updateTokenDisplay() {
                const display = document.getElementById('tokenDisplay');
                display.textContent = '🔑 ' + this.token.substring(0, 8) + '...';
                display.onclick = () => {
                    navigator.clipboard.writeText(this.token);
                    this.showSuccess('Token copied to clipboard');
                };
            }

            setupEventListeners() {
                const uploadZone = document.getElementById('uploadZone');
                const fileInput = document.getElementById('fileInput');

                uploadZone.addEventListener('click', () => fileInput.click());
                uploadZone.addEventListener('dragover', e => {
                    e.preventDefault();
                    uploadZone.classList.add('dragover');
                });
                uploadZone.addEventListener('dragleave', () => {
                    uploadZone.classList.remove('dragover');
                });
                uploadZone.addEventListener('drop', e => {
                    e.preventDefault();
                    uploadZone.classList.remove('dragover');
                    this.handleFiles(e.dataTransfer.files);
                });

                fileInput.addEventListener('change', e => {
                    this.handleFiles(e.target.files);
                });
            }

            async loadShares() {
                try {
                    const response = await fetch(`/api/list?token=${this.token}`);
                    if (!response.ok) {
                        throw new Error('Failed to load shares');
                    }
                    const data = await response.json();
                    this.shares = data.shares;

                    if (this.shares.length > 0) {
                        this.currentShare = this.shares[0];
                    }

                    this.updateSharesList();
                    await this.loadDirectory();
                } catch (error) {
                    this.showError('Error loading shares: ' + error.message);
                }
            }

            updateSharesList() {
                const list = document.getElementById('sharesList');
                list.innerHTML = '';

                this.shares.forEach((share, index) => {
                    const item = document.createElement('li');
                    item.className = 'sidebar-item' + (index === 0 ? ' active' : '');
                    item.textContent = share.id.substring(0, 8) + '...';
                    item.title = share.id;
                    item.onclick = () => this.selectShare(share, item);
                    list.appendChild(item);
                });
            }

            selectShare(share, element) {
                this.currentShare = share;
                this.currentPath = '';
                document.querySelectorAll('.sidebar-item').forEach(el => {
                    el.classList.remove('active');
                });
                element.classList.add('active');
                this.loadDirectory();
            }

            async loadDirectory() {
                if (!this.currentShare) {
                    return;
                }

                try {
                    const path = encodeURIComponent(this.currentPath);
                    const response = await fetch(
                        `/api/explore?share_id=${this.currentShare.id}&path=${path}&token=${this.token}`
                    );

                    if (!response.ok) {
                        throw new Error('Failed to load directory');
                    }

                    const data = await response.json();
                    this.renderFileList(data.items);
                    this.updateBreadcrumb();
                } catch (error) {
                    this.showError('Error loading directory: ' + error.message);
                }
            }

            renderFileList(items) {
                const fileList = document.getElementById('fileList');

                if (!items || items.length === 0) {
                    fileList.innerHTML = `
                        <div class="empty-state" style="grid-column: 1/-1;">
                            <div class="empty-state-icon">📁</div>
                            <p>No files in this directory</p>
                        </div>
                    `;
                    return;
                }

                fileList.innerHTML = items.map(item => `
                    <div class="file-item ${item.type === 'dir' ? 'is-dir' : ''}">
                        <div class="file-item-name" title="${item.name}">
                            ${item.type === 'dir' ? '📁' : '📄'} ${item.name}
                        </div>
                        <div class="file-item-meta">
                            <span class="file-item-size">
                                ${item.type === 'dir' ? 'Folder' : this.formatSize(item.size)}
                            </span>
                        </div>
                        <div class="file-item-actions">
                            ${item.type === 'dir'
                                ? `<button onclick="app.navigate('${item.path}')">Open</button>`
                                : `<button onclick="app.downloadFile('${item.path}')">Download</button>`
                            }
                        </div>
                    </div>
                `).join('');
            }

            navigate(path) {
                this.currentPath = path;
                this.loadDirectory();
            }

            updateBreadcrumb() {
                const breadcrumb = document.getElementById('breadcrumb');
                let html = '<span class="breadcrumb-item" onclick="app.navigate(\'\')">Root</span>';

                if (this.currentPath) {
                    const parts = this.currentPath.split('/').filter(p => p);
                    let current = '';
                    for (const part of parts) {
                        current += (current ? '/' : '') + part;
                        html += `<span class="breadcrumb-separator">/</span>`;
                        html += `<span class="breadcrumb-item" onclick="app.navigate('${current}')">${part}</span>`;
                    }
                }

                breadcrumb.innerHTML = html;
            }

            async handleFiles(files) {
                for (const file of files) {
                    await this.uploadFile(file);
                }
                this.loadDirectory();
            }

            async uploadFile(file) {
                const formData = new FormData();
                formData.append('file', file);
                if (this.currentPath) {
                    formData.append('path', this.currentPath);
                }

                try {
                    const response = await fetch(
                        `/api/upload?share_id=${this.currentShare.id}&token=${this.token}`,
                        {
                            method: 'POST',
                            body: formData
                        }
                    );

                    if (!response.ok) {
                        const error = await response.json();
                        throw new Error(error.error || 'Upload failed');
                    }

                    this.showSuccess(`Uploaded: ${file.name}`);
                } catch (error) {
                    this.showError(`Failed to upload ${file.name}: ${error.message}`);
                }
            }

            async downloadFile(filePath) {
                try {
                    window.location.href = `/download/${this.currentShare.id}/${filePath}?token=${this.token}`;
                } catch (error) {
                    this.showError('Download failed: ' + error.message);
                }
            }

            showNewFolderModal() {
                document.getElementById('newFolderModal').classList.add('show');
            }

            closeModal() {
                document.getElementById('newFolderModal').classList.remove('show');
                document.getElementById('folderNameInput').value = '';
            }

            async createFolder() {
                const folderName = document.getElementById('folderNameInput').value.trim();
                if (!folderName) {
                    this.showError('Folder name cannot be empty');
                    return;
                }

                try {
                    const folderPath = this.currentPath
                        ? this.currentPath + '/' + folderName
                        : folderName;

                    const response = await fetch(
                        `/api/create_folder?share_id=${this.currentShare.id}&token=${this.token}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ path: folderPath })
                        }
                    );

                    if (!response.ok) {
                        const error = await response.json();
                        throw new Error(error.error || 'Failed to create folder');
                    }

                    this.showSuccess(`Folder created: ${folderName}`);
                    this.closeModal();
                    this.loadDirectory();
                } catch (error) {
                    this.showError('Error creating folder: ' + error.message);
                }
            }

            formatSize(bytes) {
                if (!bytes) return '0 B';
                const units = ['B', 'KB', 'MB', 'GB'];
                let size = bytes;
                let unitIndex = 0;
                while (size >= 1024 && unitIndex < units.length - 1) {
                    size /= 1024;
                    unitIndex++;
                }
                return `${size.toFixed(1)} ${units[unitIndex]}`;
            }

            showMessage(message, type = 'info') {
                const container = document.getElementById('messageContainer');
                const div = document.createElement('div');
                div.className = `message ${type}`;
                div.textContent = message;
                container.appendChild(div);

                setTimeout(() => div.remove(), 5000);
            }

            showSuccess(message) {
                this.showMessage(message, 'success');
            }

            showError(message) {
                this.showMessage(message, 'error');
            }
        }

        // Initialize app
        const app = new FileShareApp();
    </script>
</body>
</html>
