<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WHOIS / IP Lookup — ghosttools</title>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #141720;
      --card: #1a1e2e;
      --border: #252a3d;
      --accent: #7c3aed;
      --text: #e2e8f0;
      --muted: #64748b;
      --red: #ef4444;
      --green: #10b981;
      --blue: #00d4ff;
      --yellow: #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
    .back { color: var(--muted); text-decoration: none; font-size: 0.85rem; display: flex; align-items: center; gap: 0.3rem; transition: color 0.15s; }
    .back:hover { color: var(--accent); }
    .title { font-weight: 700; font-size: 1.1rem; }
    .title span { color: var(--accent); }
    .badge { margin-left: auto; background: rgba(124,58,237,0.1); color: var(--accent); border: 1px solid rgba(124,58,237,0.3); font-size: 0.72rem; padding: 0.2rem 0.7rem; border-radius: 99px; }
    main { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    .search-box {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 1.5rem; margin-bottom: 1.5rem;
    }
    .search-row { display: flex; gap: 0.75rem; }
    .search-input {
      flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: 'Courier New', monospace; font-size: 1rem;
      padding: 0.75rem 1rem; outline: none; transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent); }
    button { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 0.75rem 1.5rem; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
    button:hover { opacity: 0.85; }
    .btn-sm { padding: 0.4rem 0.9rem; font-size: 0.78rem; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--text); opacity: 1; }
    .examples { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; align-items: center; }
    .examples span { font-size: 0.78rem; color: var(--muted); }
    .ex-btn { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); border-radius: 6px; padding: 0.25rem 0.7rem; font-size: 0.78rem; cursor: pointer; font-family: monospace; transition: all 0.15s; }
    .ex-btn:hover { color: var(--accent); border-color: var(--accent); }
    .status { font-size: 0.82rem; color: var(--muted); margin-top: 0.75rem; display: none; align-items: center; gap: 0.5rem; }
    .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .results { display: none; }
    .target-banner {
      background: var(--card); border: 1px solid rgba(124,58,237,0.4); border-radius: 12px;
      padding: 1.2rem 1.5rem; margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
    }
    .target-icon { font-size: 2rem; }
    .target-detail { flex: 1; min-width: 200px; }
    .target-val { font-size: 1.3rem; font-weight: 700; font-family: monospace; }
    .target-sub { color: var(--muted); font-size: 0.82rem; margin-top: 0.2rem; }
    .type-badge { font-size: 0.72rem; padding: 0.2rem 0.7rem; border-radius: 99px; font-weight: 700; font-family: monospace; }
    .type-ip { background: rgba(0,212,255,0.1); color: var(--blue); border: 1px solid rgba(0,212,255,0.3); }
    .type-domain { background: rgba(124,58,237,0.1); color: var(--accent); border: 1px solid rgba(124,58,237,0.3); }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
    @media (max-width: 700px) { .grid2 { grid-template-columns: 1fr; } }
    .panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .panel-head { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.75rem 1rem; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; justify-content: space-between; }
    .panel-body { padding: 0; }
    .info-row { display: flex; border-bottom: 1px solid var(--border); }
    .info-row:last-child { border-bottom: none; }
    .info-key { padding: 0.65rem 0.9rem; font-size: 0.78rem; color: var(--muted); min-width: 140px; flex-shrink: 0; border-right: 1px solid var(--border); font-family: monospace; }
    .info-val { padding: 0.65rem 0.9rem; font-family: monospace; font-size: 0.82rem; word-break: break-all; flex: 1; }
    .info-val a { color: var(--accent); text-decoration: none; }
    .info-val a:hover { text-decoration: underline; }
    .dns-section { margin-bottom: 1.5rem; }
    .dns-type-tabs { display: flex; gap: 0.4rem; padding: 0.8rem 1rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .dns-tab { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); border-radius: 6px; padding: 0.25rem 0.7rem; font-size: 0.75rem; cursor: pointer; font-family: monospace; font-weight: 700; transition: all 0.15s; }
    .dns-tab.active { background: rgba(124,58,237,0.15); color: var(--accent); border-color: rgba(124,58,237,0.4); }
    .dns-records { padding: 0; }
    .dns-record { border-bottom: 1px solid var(--border); padding: 0.6rem 1rem; display: grid; grid-template-columns: 60px 60px 1fr; gap: 0.75rem; align-items: center; font-family: monospace; font-size: 0.8rem; }
    .dns-record:last-child { border-bottom: none; }
    .dns-type-tag { font-size: 0.68rem; font-weight: 700; padding: 0.15rem 0.4rem; border-radius: 4px; text-transform: uppercase; }
    .dns-A { background: rgba(0,212,255,0.1); color: var(--blue); }
    .dns-AAAA { background: rgba(124,58,237,0.1); color: var(--accent); }
    .dns-MX { background: rgba(245,158,11,0.1); color: var(--yellow); }
    .dns-NS { background: rgba(16,185,129,0.1); color: var(--green); }
    .dns-TXT { background: rgba(249,115,22,0.1); color: #f97316; }
    .dns-CNAME { background: rgba(239,68,68,0.1); color: var(--red); }
    .dns-SOA { background: rgba(100,116,139,0.1); color: var(--muted); }
    .dns-ttl { color: var(--muted); font-size: 0.72rem; }
    .whois-section { margin-bottom: 1.5rem; }
    .whois-raw { padding: 1rem; font-family: 'Courier New', monospace; font-size: 0.76rem; line-height: 1.7; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow: auto; color: var(--text); }
    .whois-raw .wk { color: var(--blue); }
    .whois-raw .wv { color: var(--text); }
    .error-box { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; padding: 0.75rem 1rem; color: var(--red); font-size: 0.82rem; margin: 0.5rem 0; }
    .tag-green { color: var(--green); }
    .tag-red { color: var(--red); }
    .tag-yellow { color: var(--yellow); }
    .copy-btn { color: var(--muted); background: transparent; border: 1px solid var(--border); border-radius: 4px; padding: 0.15rem 0.4rem; font-size: 0.68rem; cursor: pointer; line-height: 1; }
    .copy-btn:hover { color: var(--accent); border-color: var(--accent); opacity:1; }
    .empty-msg { padding: 1rem; color: var(--muted); font-size: 0.83rem; text-align: center; }
    .section-full { margin-bottom: 1.5rem; }
  </style>
</head>
<body>
<header>
  <a href="../index.html" class="back">← Back</a>
  <div class="title">🌐 WHOIS / IP <span>Lookup</span></div>
  <span class="badge">OSINT · Recon</span>
</header>

<main>
  <div class="search-box">
    <div class="search-row">
      <input type="text" id="target" class="search-input" placeholder="domain.com or 8.8.8.8"
             onkeydown="if(event.key==='Enter')lookup()"/>
      <button onclick="lookup()">🔍 Lookup</button>
    </div>
    <div class="examples">
      <span>Quick:</span>
      <button class="ex-btn" onclick="quickLookup('google.com')">google.com</button>
      <button class="ex-btn" onclick="quickLookup('github.com')">github.com</button>
      <button class="ex-btn" onclick="quickLookup('8.8.8.8')">8.8.8.8 (Google DNS)</button>
      <button class="ex-btn" onclick="quickLookup('1.1.1.1')">1.1.1.1 (Cloudflare)</button>
    </div>
    <div class="status" id="statusMsg">
      <div class="spinner"></div>
      <span id="statusText">Querying...</span>
    </div>
  </div>

  <div class="results" id="results"></div>
</main>

<script>
function quickLookup(val) {
  document.getElementById('target').value = val;
  lookup();
}

function isIP(str) {
  return /^(\d{1,3}\.){3}\d{1,3}$/.test(str) ||
    /^([a-f0-9:]+:+)+[a-f0-9]+$/i.test(str); // IPv6
}

function setStatus(msg) {
  const el = document.getElementById('statusMsg');
  el.style.display = msg ? 'flex' : 'none';
  document.getElementById('statusText').textContent = msg || '';
}

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function fetchText(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.text();
}

async function dnsQuery(name, type) {
  try {
    const data = await fetchJSON(
      `https://dns.google/resolve?name=${encodeURIComponent(name)}&type=${type}`
    );
    return data.Answer || [];
  } catch { return []; }
}

async function lookup() {
  const raw = document.getElementById('target').value.trim()
    .replace(/^https?:\/\//i, '').replace(/\/.*/,'');
  if (!raw) return;

  const resultsEl = document.getElementById('results');
  resultsEl.style.display = 'none';
  resultsEl.innerHTML = '';
  setStatus('Querying data sources...');

  const ipMode = isIP(raw);
  let sections = '';

  try {
    if (ipMode) {
      sections = await buildIPSections(raw);
    } else {
      sections = await buildDomainSections(raw);
    }

    resultsEl.innerHTML = sections;
    resultsEl.style.display = 'block';
  } catch(e) {
    resultsEl.innerHTML = `<div class="error-box">Error: ${escHTML(e.message)}</div>`;
    resultsEl.style.display = 'block';
  }
  setStatus(null);
}

async function buildIPSections(ip) {
  setStatus('Fetching IP geolocation & ASN...');
  let geoData = null, rdnsData = [];
  try {
    geoData = await fetchJSON(`https://ip-api.com/json/${ip}?fields=status,message,country,countryCode,region,regionName,city,zip,lat,lon,timezone,isp,org,as,asname,reverse,mobile,proxy,hosting,query`);
  } catch {}

  setStatus('Querying reverse DNS...');
  try {
    const rev = ip.split('.').reverse().join('.') + '.in-addr.arpa';
    rdnsData = await dnsQuery(rev, 'PTR');
  } catch {}

  let html = buildTargetBanner(ip, 'ip');

  // Geo / ASN panel
  if (geoData && geoData.status === 'success') {
    html += `<div class="grid2">`;

    html += `<div class="panel"><div class="panel-head">IP Information</div><div class="panel-body">`;
    const geoFields = [
      ['IP Address', geoData.query],
      ['Country', `${geoData.country} (${geoData.countryCode})`],
      ['Region', `${geoData.regionName}, ${geoData.region}`],
      ['City', geoData.city],
      ['ZIP', geoData.zip],
      ['Timezone', geoData.timezone],
      ['Coordinates', `${geoData.lat}, ${geoData.lon} — <a href="https://www.openstreetmap.org/?mlat=${geoData.lat}&mlon=${geoData.lon}&zoom=10" target="_blank" rel="noopener">Map</a>`],
    ];
    for (const [k, v] of geoFields) {
      if (v && v !== 'undefined, undefined' && v !== ', ') {
        html += infoRow(k, v);
      }
    }
    html += `</div></div>`;

    html += `<div class="panel"><div class="panel-head">Network / ASN</div><div class="panel-body">`;
    const netFields = [
      ['ISP', geoData.isp],
      ['Organization', geoData.org],
      ['ASN', geoData.as],
      ['AS Name', geoData.asname],
      ['Reverse DNS', rdnsData.length > 0 ? rdnsData[0].data : 'None'],
      ['Proxy/VPN', geoData.proxy ? `<span class="tag-red">Yes</span>` : `<span class="tag-green">No</span>`],
      ['Hosting/DC', geoData.hosting ? `<span class="tag-yellow">Yes</span>` : `<span class="tag-green">No</span>`],
      ['Mobile', geoData.mobile ? 'Yes' : 'No'],
    ];
    for (const [k, v] of netFields) {
      if (v) html += infoRow(k, v);
    }
    html += `</div></div></div>`;
  } else {
    html += `<div class="error-box">IP geolocation not available for this address.</div>`;
  }

  // WHOIS for the IP
  html += await buildWhoisSection(ip);

  return html;
}

async function buildDomainSections(domain) {
  setStatus('Fetching IP info...');
  let resolvedIP = null;

  // Resolve A record
  const aRecords = await dnsQuery(domain, 'A');
  if (aRecords.length > 0) {
    resolvedIP = aRecords[0].data;
  }

  let geoData = null;
  if (resolvedIP) {
    try {
      geoData = await fetchJSON(`https://ip-api.com/json/${resolvedIP}?fields=status,country,countryCode,regionName,city,timezone,isp,org,as,asname,proxy,hosting,query`);
    } catch {}
  }

  setStatus('Querying DNS records...');
  const [aaaaRecs, mxRecs, nsRecs, txtRecs, cnameRecs, soaRecs] = await Promise.all([
    dnsQuery(domain, 'AAAA'),
    dnsQuery(domain, 'MX'),
    dnsQuery(domain, 'NS'),
    dnsQuery(domain, 'TXT'),
    dnsQuery(domain, 'CNAME'),
    dnsQuery(domain, 'SOA'),
  ]);

  let html = buildTargetBanner(domain, 'domain');

  // Quick info panel
  html += `<div class="grid2">`;
  html += `<div class="panel"><div class="panel-head">Domain Overview</div><div class="panel-body">`;
  const domainFields = [
    ['Domain', domain],
    ['Resolved IP', resolvedIP || 'N/A'],
    ['A Records', aRecords.length > 0 ? aRecords.map(r => r.data).join(', ') : 'None'],
    ['AAAA Records', aaaaRecs.length > 0 ? aaaaRecs.map(r => r.data).join(', ') : 'None'],
    ['NS Records', nsRecs.length > 0 ? nsRecs.map(r => r.data.replace(/\.$/,'')).join(', ') : 'None'],
    ['Mail (MX)', mxRecs.length > 0 ? mxRecs.map(r => r.data).join('<br>') : 'None'],
    ['CNAME', cnameRecs.length > 0 ? cnameRecs.map(r => r.data).join(', ') : 'None'],
  ];
  for (const [k, v] of domainFields) html += infoRow(k, v);
  html += `</div></div>`;

  if (geoData && geoData.status === 'success') {
    html += `<div class="panel"><div class="panel-head">Hosting Location</div><div class="panel-body">`;
    const hostFields = [
      ['IP', geoData.query],
      ['Country', `${geoData.country} (${geoData.countryCode})`],
      ['Region / City', `${geoData.regionName}, ${geoData.city}`],
      ['Timezone', geoData.timezone],
      ['ISP', geoData.isp],
      ['Organization', geoData.org],
      ['ASN', geoData.as],
      ['AS Name', geoData.asname],
      ['Proxy/VPN', geoData.proxy ? `<span class="tag-red">Yes</span>` : `<span class="tag-green">No</span>`],
      ['Hosting/DC', geoData.hosting ? `<span class="tag-yellow">Yes</span>` : `<span class="tag-green">No</span>`],
    ];
    for (const [k, v] of hostFields) if (v) html += infoRow(k, v);
    html += `</div></div>`;
  }
  html += `</div>`;

  // DNS Records full section
  const allDNS = [
    ...aRecords.map(r => ({...r, type: 'A'})),
    ...aaaaRecs.map(r => ({...r, type: 'AAAA'})),
    ...cnameRecs.map(r => ({...r, type: 'CNAME'})),
    ...mxRecs.map(r => ({...r, type: 'MX'})),
    ...nsRecs.map(r => ({...r, type: 'NS'})),
    ...txtRecs.map(r => ({...r, type: 'TXT'})),
    ...soaRecs.map(r => ({...r, type: 'SOA'})),
  ];

  html += `<div class="section-full panel" style="margin-bottom:1.5rem">
    <div class="panel-head">
      <span>DNS Records</span>
      <span style="color:var(--muted)">${allDNS.length} records</span>
    </div>`;

  if (allDNS.length === 0) {
    html += `<div class="empty-msg">No DNS records found.</div>`;
  } else {
    html += `<div class="dns-records">`;
    for (const r of allDNS) {
      const cls = `dns-${r.type}`;
      const val = r.data || '';
      const ttl = r.TTL ? `${r.TTL}s` : '';
      html += `<div class="dns-record">
        <span class="dns-type-tag ${cls}">${r.type}</span>
        <span class="dns-ttl">${ttl}</span>
        <span style="word-break:break-all">${escHTML(val.replace(/\.$/, ''))}</span>
      </div>`;
    }
    html += `</div>`;
  }
  html += `</div>`;

  // TXT record analysis (SPF, DMARC, DKIM hints)
  if (txtRecs.length > 0) {
    html += buildTXTAnalysis(txtRecs, domain);
  }

  // WHOIS
  html += await buildWhoisSection(domain);

  return html;
}

function buildTXTAnalysis(txtRecs, domain) {
  const all = txtRecs.map(r => r.data || '');
  const spf = all.find(t => t.includes('v=spf1'));
  const dmarc = all.find(t => t.includes('v=DMARC1'));

  let html = `<div class="section-full panel" style="margin-bottom:1.5rem">
    <div class="panel-head">Email Security (TXT Analysis)</div><div class="panel-body">`;

  html += infoRow('SPF Record', spf
    ? `<span class="tag-green">✓ Present</span> — <code style="font-size:0.75rem">${escHTML(spf.slice(0,80))}</code>`
    : `<span class="tag-red">✗ Not found</span> — Domain may be spoofable`);

  html += infoRow('DMARC Policy', dmarc
    ? `<span class="tag-green">✓ Present</span> — <code style="font-size:0.75rem">${escHTML(dmarc.slice(0,80))}</code>`
    : `<span class="tag-red">✗ Not found</span> — No DMARC protection`);

  if (spf) {
    const allStr = spf.includes('~all') ? 'SoftFail (~all)' : spf.includes('-all') ? 'HardFail (-all)' : spf.includes('+all') ? '<span class="tag-red">PassAll (+all) — INSECURE</span>' : 'Neutral';
    html += infoRow('SPF Strictness', allStr);
  }

  html += `</div></div>`;
  return html;
}

async function buildWhoisSection(target) {
  setStatus('Fetching WHOIS data...');
  let whoisText = '';
  try {
    const r = await fetch(`https://api.hackertarget.com/whois/?q=${encodeURIComponent(target)}`);
    if (r.ok) {
      whoisText = await r.text();
    }
  } catch {}

  if (!whoisText || whoisText.startsWith('error')) {
    return `<div class="section-full panel" style="margin-bottom:1.5rem">
      <div class="panel-head">WHOIS Record</div>
      <div class="empty-msg">WHOIS data unavailable (API rate limit or unsupported TLD).</div>
    </div>`;
  }

  // Parse key WHOIS fields
  const parsed = parseWHOIS(whoisText);

  let html = `<div class="section-full panel" style="margin-bottom:1.5rem">
    <div class="panel-head">
      <span>WHOIS Record</span>
      <button class="copy-btn btn-sm" onclick="copyText('whois-raw-data')">Copy</button>
    </div>`;

  if (Object.keys(parsed).length > 0) {
    html += `<div class="panel-body" style="border-bottom:1px solid var(--border)">`;
    for (const [k, v] of Object.entries(parsed)) {
      html += infoRow(k, escHTML(v));
    }
    html += `</div>`;
  }

  html += `<div class="whois-raw" id="whois-raw-data">${colorizeWHOIS(whoisText)}</div>
  </div>`;

  return html;
}

function parseWHOIS(text) {
  const map = {};
  const matchers = [
    [/Domain Name:\s*(.+)/i, 'Domain Name'],
    [/Registrar:\s*(.+)/i, 'Registrar'],
    [/Registrar IANA ID:\s*(.+)/i, 'Registrar IANA ID'],
    [/Creation Date:\s*(.+)/i, 'Created'],
    [/Updated Date:\s*(.+)/i, 'Updated'],
    [/Registry Expiry Date:\s*(.+)/i, 'Expires'],
    [/Expir\w+ Date:\s*(.+)/i, 'Expires'],
    [/Domain Status:\s*(.+)/i, 'Status'],
    [/Name Server:\s*(.+)/i, 'Name Server'],
    [/DNSSEC:\s*(.+)/i, 'DNSSEC'],
    [/Registrant Organization:\s*(.+)/i, 'Registrant Org'],
    [/Registrant Country:\s*(.+)/i, 'Registrant Country'],
    [/Registrant Email:\s*(.+)/i, 'Registrant Email'],
    [/Tech Email:\s*(.+)/i, 'Tech Email'],
    [/Admin Email:\s*(.+)/i, 'Admin Email'],
    [/OrgName:\s*(.+)/i, 'Org Name'],
    [/NetRange:\s*(.+)/i, 'Net Range'],
    [/CIDR:\s*(.+)/i, 'CIDR'],
    [/NetType:\s*(.+)/i, 'Net Type'],
    [/Country:\s*(.+)/i, 'Country'],
    [/RegDate:\s*(.+)/i, 'Reg Date'],
    [/Updated:\s*(.+)/i, 'Updated'],
    [/abuse-mailbox:\s*(.+)/i, 'Abuse Email'],
  ];

  for (const [re, label] of matchers) {
    const m = text.match(re);
    if (m && !map[label]) {
      map[label] = m[1].trim();
    }
  }
  return map;
}

function colorizeWHOIS(text) {
  return escHTML(text).replace(/^([A-Za-z][^:\n]+):(.*)/gm, (_, k, v) =>
    `<span class="wk">${k}:</span><span class="wv">${v}</span>`
  );
}

function buildTargetBanner(target, type) {
  const icon = type === 'ip' ? '🖥️' : '🌐';
  return `<div class="target-banner">
    <div class="target-icon">${icon}</div>
    <div class="target-detail">
      <div class="target-val">${escHTML(target)}</div>
      <div class="target-sub">Lookup results • ${new Date().toUTCString()}</div>
    </div>
    <span class="type-badge type-${type}">${type.toUpperCase()}</span>
  </div>`;
}

function infoRow(key, val) {
  return `<div class="info-row">
    <div class="info-key">${escHTML(key)}</div>
    <div class="info-val">${val}</div>
  </div>`;
}

function escHTML(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyText(id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.innerText).then(() => alert('Copied to clipboard'));
}
</script>
</body>
</html>
